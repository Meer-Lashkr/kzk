{% extends 'base.html' %}
{% block title %}Ask a Question — Koma Zmanî Kurdî{% endblock %}
{% block content %}
    <div class="container page-container">
        <h1 class="page-title">Ask a Question</h1>
        <form method="post" class="content-form">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
                </div>
            {% endfor %}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Post Question</button>
                <a href="{% url 'question_list' %}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
{% endblock %}
